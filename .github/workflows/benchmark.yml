name: Benchmark

# Three triggers:
# 1. Comment "/benchmark" on a PR, compares PR vs base.
# 2. Push to master, stores result for historical trend tracking.
# 3. Manual dispatch, runs benchmark on the selected branch.

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'stubs/**'
      - 'tests/Benchmark/**'
      - 'composer.json'
      - '.github/workflows/benchmark.yml'

concurrency:
  group: benchmark-${{ github.event.issue.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Monica release for reproducible benchmarks.
  # Monica is a real-world Laravel app (~700 PHP files, Laravel 12) https://github.com/monicahq/monica.
  # beta.5 is the lowest tag on Laravel 12 (the plugin requires illuminate ^12.4 || ^13;
  # beta.4 and earlier ship Laravel 11). Requiring the plugin bumps Monica's Laravel
  # to >=12.4 during `composer update`. Its lock pins the dev dependency
  # laravel-lang/http-statuses 3.10.3, which Packagist flags as malware, so a plain
  # `composer install` aborts. The Prime step below bumps that one package to a clean
  # release before installing (see there).
  MONICA_REPO: monicahq/monica
  MONICA_REF: "v5.0.0-beta.5"
  PHP_VERSION: "8.3"
  HYPERFINE_RUNS: 3

jobs:

  # ── PR benchmark: triggered by "/benchmark" comment ──────────────────
  pr-benchmark:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/benchmark')
      && contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write  # needed for posting PR comments
      issues: write  # needed for comment reactions
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: React to comment
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/"$COMMENT_ID"/reactions \
            -f content=rocket --silent

      - name: Get PR refs
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const expectedRepo = `${context.repo.owner}/${context.repo.repo}`;
            const headRepo = pr.head.repo ? pr.head.repo.full_name : null;
            if (headRepo !== expectedRepo) {
              core.setFailed(`Refusing to benchmark PR from a different repository (head: ${headRepo}, expected: ${expectedRepo})`);
              return;
            }
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('pr_number', String(pr.number));

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ steps.pr.outputs.head_sha }}
          path: plugin-pr

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ steps.pr.outputs.base_sha }}
          path: plugin-base

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          ini-values: opcache.enable_cli=1
          coverage: none
          tools: composer:v2

      - name: Install hyperfine
        # GitHub-hosted runner images ship a recent apt cache, so skip `apt-get update`.
        # Fall back to update+install only if the cached index is stale.
        run: sudo apt-get install -yqq hyperfine || (sudo apt-get update -qq && sudo apt-get install -yqq hyperfine)

      - name: Clone Monica
        run: |
          git clone --depth 1 --branch "$MONICA_REF" \
            "https://github.com/$MONICA_REPO" /tmp/monica-source

      # Cache Monica's vendor once on the shared source so both variants inherit it via `cp -a`.
      # Key is safe to pin to MONICA_REF + PHP_VERSION because the ref points at a tag
      # with an immutable composer.lock.
      - name: Cache Monica vendor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/monica-source/vendor
          key: monica-vendor-${{ env.MONICA_REF }}-php${{ env.PHP_VERSION }}-v2

      - name: Prime Monica vendor
        run: |
          cd /tmp/monica-source
          # Monica's lock pins the dev dependency laravel-lang/http-statuses at a version
          # Packagist flags as malware, so a plain `composer install` aborts. Bumping just
          # that one package to a clean release (the constraint is ^3.8) rewrites the lock and
          # installs the full set. Run unconditionally — not behind a `[ ! -d vendor ]` guard —
          # because the vendor cache does not include composer.lock, so on a cache hit the lock
          # is restored from the fresh git clone at the flagged version; the rewrite must run
          # every time so the corrected lock is what `cp -a` copies into the base/pr projects.
          COMPOSER_MEMORY_LIMIT=-1 composer update laravel-lang/http-statuses --no-interaction --no-progress

      - name: Setup benchmark projects
        run: |
          setup_project() {
            local dir=$1 plugin_path=$2
            cp -a /tmp/monica-source "$dir"
            cd "$dir"
            composer config repositories.plugin \
              '{"type": "path", "url": "'"$plugin_path"'", "options": {"symlink": true}}'
            composer config minimum-stability dev
            composer require --dev "psalm/plugin-laravel:*" --no-interaction --no-update
            COMPOSER_MEMORY_LIMIT=-1 composer update psalm/plugin-laravel \
              --no-interaction --no-progress --with-all-dependencies
            composer show psalm/plugin-laravel
            cp "$GITHUB_WORKSPACE/plugin-base/tests/Benchmark/psalm-benchmark.xml" psalm-benchmark.xml
          }
          setup_project /tmp/monica-base "$GITHUB_WORKSPACE/plugin-base"
          setup_project /tmp/monica-pr "$GITHUB_WORKSPACE/plugin-pr"

      # Use base checkout's harness for both runs so the PR cannot alter measurement.
      - name: Benchmark with hyperfine
        run: |
          HARNESS="$GITHUB_WORKSPACE/plugin-base/tests/Benchmark/run-psalm.sh"
          : > /tmp/mem-base.txt && : > /tmp/mem-pr.txt
          : > /tmp/issues-base.txt && : > /tmp/issues-pr.txt
          : > /tmp/stats-base.txt && : > /tmp/stats-pr.txt
          # No warmup: this job measures the diff between base and PR, both pay the same
          # first-run page-cache tax, so the comparison stays directionally correct.
          hyperfine \
            --runs "$HYPERFINE_RUNS" \
            --command-name base "bash \"$HARNESS\" /tmp/monica-base psalm-benchmark.xml /tmp/mem-base.txt /tmp/issues-base.txt /tmp/stats-base.txt" \
            --command-name pr   "bash \"$HARNESS\" /tmp/monica-pr   psalm-benchmark.xml /tmp/mem-pr.txt /tmp/issues-pr.txt /tmp/stats-pr.txt" \
            --export-json /tmp/hyperfine.json \
            --ignore-failure
          echo "--- hyperfine results ---"
          jq '.results[] | {command, mean, stddev, min, max}' /tmp/hyperfine.json

      - name: Compare results
        id: compare
        run: |
          set +e
          REPORT=$(php plugin-base/tests/Benchmark/compare.php \
            /tmp/hyperfine.json /tmp/mem-base.txt /tmp/mem-pr.txt \
            /tmp/issues-base.txt /tmp/issues-pr.txt \
            /tmp/stats-base.txt /tmp/stats-pr.txt)
          EXIT_CODE=$?
          set -e
          echo "$REPORT"
          {
            echo "report<<REPORT_EOF"
            echo "$REPORT"
            echo "REPORT_EOF"
          } >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.compare.outputs.report }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          BODY="${REPORT:-Benchmark failed to produce results. Check the workflow logs.}"
          gh pr comment "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --body "$BODY"


  # ── Master benchmark: stores result + historical trend ───────────────
  master-benchmark:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # needed for gh-pages auto-push (benchmark history)
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout plugin
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          ini-values: opcache.enable_cli=1
          coverage: none
          tools: composer:v2

      - name: Install hyperfine
        # GitHub-hosted runner images ship a recent apt cache, so skip `apt-get update`.
        # Fall back to update+install only if the cached index is stale.
        run: sudo apt-get install -yqq hyperfine || (sudo apt-get update -qq && sudo apt-get install -yqq hyperfine)

      - name: Clone Monica
        run: |
          git clone --depth 1 --branch "$MONICA_REF" \
            "https://github.com/$MONICA_REPO" /tmp/monica

      - name: Cache Monica vendor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/monica/vendor
          key: monica-vendor-${{ env.MONICA_REF }}-php${{ env.PHP_VERSION }}-v2

      - name: Setup benchmark project
        run: |
          cd /tmp/monica
          # Bump Monica's malware-flagged dev dependency laravel-lang/http-statuses to a clean
          # release (see the pr-benchmark "Prime Monica vendor" step for the full rationale).
          # Unconditional: the vendor cache excludes composer.lock, so the flagged lock returns
          # on every cache hit and must be rewritten before any other composer command runs.
          COMPOSER_MEMORY_LIMIT=-1 composer update laravel-lang/http-statuses --no-interaction --no-progress
          composer config repositories.plugin \
            '{"type": "path", "url": "'"$GITHUB_WORKSPACE"'", "options": {"symlink": true}}'
          composer config minimum-stability dev
          composer require --dev "psalm/plugin-laravel:*" --no-interaction --no-update
          COMPOSER_MEMORY_LIMIT=-1 composer update psalm/plugin-laravel \
            --no-interaction --no-progress --with-all-dependencies
          composer show psalm/plugin-laravel
          cp "$GITHUB_WORKSPACE/tests/Benchmark/psalm-benchmark.xml" psalm-benchmark.xml

      - name: Benchmark with hyperfine
        run: |
          : > /tmp/mem.txt
          hyperfine \
            --warmup 1 \
            --runs "$HYPERFINE_RUNS" \
            --command-name psalm \
            "bash \"$GITHUB_WORKSPACE/tests/Benchmark/run-psalm.sh\" /tmp/monica psalm-benchmark.xml /tmp/mem.txt" \
            --export-json /tmp/hyperfine.json \
            --ignore-failure

      - name: Validate benchmark results
        run: |
          # shellcheck disable=SC2016
          php -r '
          $data = json_decode(file_get_contents("/tmp/hyperfine.json"), true, 512, JSON_THROW_ON_ERROR);
          $exitCodes = $data["results"][0]["exit_codes"] ?? [];
          $failures = array_filter($exitCodes, fn($c) => (int) $c === 1 || (int) $c >= 128);
          if ($failures !== []) {
              fwrite(STDERR, "Psalm failed with exit codes: " . implode(", ", $exitCodes) . "\n");
              exit(1);
          }
          '

      # Transform to github-action-benchmark customSmallerIsBetter format
      - name: Build trend data
        run: |
          # shellcheck disable=SC2016
          php -r '
          $h = json_decode(file_get_contents("/tmp/hyperfine.json"), true, 512, JSON_THROW_ON_ERROR)["results"][0];
          $memLines = array_filter(array_map("trim", file("/tmp/mem.txt")), fn($l) => $l !== "");
          $peakMem = max(array_map("floatval", $memLines));
          echo json_encode([
              ["name" => "Wall time",   "value" => round($h["mean"], 2),   "unit" => "s",  "range" => "± " . round($h["stddev"], 2)],
              ["name" => "Peak memory", "value" => round($peakMem, 0),     "unit" => "MB"],
          ], JSON_PRETTY_PRINT);
          ' > /tmp/benchmark-trend.json
          cat /tmp/benchmark-trend.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-${{ github.sha }}
          path: |
            /tmp/hyperfine.json
            /tmp/benchmark-trend.json
          retention-days: 90

      - name: Store benchmark trend
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: customSmallerIsBetter
          name: Plugin Performance
          output-file-path: /tmp/benchmark-trend.json
          github-token: ${{ github.token }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
