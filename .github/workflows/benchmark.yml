name: Benchmark

# Push to master (or manual dispatch): benchmarks Monica with the plugin
# installed, stores the result for historical trend tracking (GH Pages chart,
# regression alert at 150%).
#
# There used to be a second, PR-comment-triggered ("/benchmark") path here that
# compared PR vs base on Monica alone. It was dropped as redundant:
# psalm-delta.yml's `/psalm-delta` command already reports a per-app wall-time
# delta (Monica included, among others) in the same comment thread a reviewer
# already uses for issue-count deltas — having two slash-commands answer
# overlapping "is this PR slower" questions was more surface area than value.
# The one thing that path had and psalm-delta doesn't — repeated hyperfine runs
# and peak-memory capture — is a good candidate for a proper continuous-
# benchmarking service (e.g. Bencher, which has a native `shell_hyperfine`
# adapter and free-for-public-OSS bare-metal runners, sidestepping the shared-
# runner jitter psalm-delta's report has to filter out) rather than rebuilding
# it here; that's a follow-up, not done in this change.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'stubs/**'
      - 'tests/Benchmark/**'
      - 'composer.json'
      - '.github/workflows/benchmark.yml'

concurrency:
  group: benchmark-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Monica release for reproducible benchmarks.
  # Monica is a real-world Laravel app (~700 PHP files, Laravel 12) https://github.com/monicahq/monica.
  # beta.5 is the lowest tag on Laravel 12 (the plugin requires illuminate ^12.14 || ^13.3;
  # beta.4 and earlier ship Laravel 11). Requiring the plugin bumps Monica's Laravel
  # to >=12.14 during `composer update`. Its lock pins the dev dependency
  # laravel-lang/http-statuses 3.10.3, which Packagist flags as malware, so a plain
  # `composer install` aborts. The Prime step below bumps that one package to a clean
  # release before installing (see there).
  MONICA_REPO: monicahq/monica
  MONICA_REF: "v5.0.0-beta.5"
  PHP_VERSION: "8.3"
  HYPERFINE_RUNS: 3

jobs:

  # ── Master benchmark: stores result + historical trend ───────────────
  master-benchmark:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # needed for gh-pages auto-push (benchmark history)
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout plugin
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          ini-values: opcache.enable_cli=1
          coverage: none
          tools: composer:v2

      - name: Install hyperfine
        # GitHub-hosted runner images ship a recent apt cache, so skip `apt-get update`.
        # Fall back to update+install only if the cached index is stale.
        run: sudo apt-get install -yqq hyperfine || (sudo apt-get update -qq && sudo apt-get install -yqq hyperfine)

      - name: Clone Monica
        run: |
          git clone --depth 1 --branch "$MONICA_REF" \
            "https://github.com/$MONICA_REPO" /tmp/monica

      - name: Cache Monica vendor
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /tmp/monica/vendor
          key: monica-vendor-${{ env.MONICA_REF }}-php${{ env.PHP_VERSION }}-v2

      - name: Setup benchmark project
        run: |
          cd /tmp/monica
          # Bump Monica's malware-flagged dev dependency laravel-lang/http-statuses to a clean
          # release (see the pr-benchmark "Prime Monica vendor" step for the full rationale).
          # Unconditional: the vendor cache excludes composer.lock, so the flagged lock returns
          # on every cache hit and must be rewritten before any other composer command runs.
          COMPOSER_MEMORY_LIMIT=-1 composer update laravel-lang/http-statuses --no-interaction --no-progress
          composer config repositories.plugin \
            '{"type": "path", "url": "'"$GITHUB_WORKSPACE"'", "options": {"symlink": true}}'
          composer config minimum-stability dev
          composer require --dev "psalm/plugin-laravel:*" --no-interaction --no-update
          COMPOSER_MEMORY_LIMIT=-1 composer update psalm/plugin-laravel \
            --no-interaction --no-progress --with-all-dependencies
          composer show psalm/plugin-laravel
          cp "$GITHUB_WORKSPACE/tests/Benchmark/psalm-benchmark.xml" psalm-benchmark.xml

      - name: Benchmark with hyperfine
        run: |
          : > /tmp/mem.txt
          hyperfine \
            --warmup 1 \
            --runs "$HYPERFINE_RUNS" \
            --command-name psalm \
            "bash \"$GITHUB_WORKSPACE/tests/Benchmark/run-psalm.sh\" /tmp/monica psalm-benchmark.xml /tmp/mem.txt" \
            --export-json /tmp/hyperfine.json \
            --ignore-failure

      - name: Validate benchmark results
        run: |
          # shellcheck disable=SC2016
          php -r '
          $data = json_decode(file_get_contents("/tmp/hyperfine.json"), true, 512, JSON_THROW_ON_ERROR);
          $exitCodes = $data["results"][0]["exit_codes"] ?? [];
          $failures = array_filter($exitCodes, fn($c) => (int) $c === 1 || (int) $c >= 128);
          if ($failures !== []) {
              fwrite(STDERR, "Psalm failed with exit codes: " . implode(", ", $exitCodes) . "\n");
              exit(1);
          }
          '

      # Transform to github-action-benchmark customSmallerIsBetter format
      - name: Build trend data
        run: |
          # shellcheck disable=SC2016
          php -r '
          $h = json_decode(file_get_contents("/tmp/hyperfine.json"), true, 512, JSON_THROW_ON_ERROR)["results"][0];
          $memLines = array_filter(array_map("trim", file("/tmp/mem.txt")), fn($l) => $l !== "");
          $peakMem = max(array_map("floatval", $memLines));
          echo json_encode([
              ["name" => "Wall time",   "value" => round($h["mean"], 2),   "unit" => "s",  "range" => "± " . round($h["stddev"], 2)],
              ["name" => "Peak memory", "value" => round($peakMem, 0),     "unit" => "MB"],
          ], JSON_PRETTY_PRINT);
          ' > /tmp/benchmark-trend.json
          cat /tmp/benchmark-trend.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-${{ github.sha }}
          path: |
            /tmp/hyperfine.json
            /tmp/benchmark-trend.json
          retention-days: 90

      - name: Store benchmark trend
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: customSmallerIsBetter
          name: Plugin Performance
          output-file-path: /tmp/benchmark-trend.json
          github-token: ${{ github.token }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
