name: Benchmark

# Three triggers:
# 1. Comment "/benchmark" on a PR, compares PR vs base.
# 2. Push to master, stores result for historical trend tracking.
# 3. Manual dispatch, runs benchmark on the selected branch.

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'stubs/**'
      - 'tests/Benchmark/**'
      - 'composer.json'
      - '.github/workflows/benchmark.yml'

concurrency:
  group: benchmark-${{ github.event.issue.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Monica release for reproducible benchmarks.
  # Monica is a real-world Laravel app (~700 PHP files, Laravel 12) https://github.com/monicahq/monica.
  MONICA_REPO: monicahq/monica
  MONICA_REF: "v5.0.0-beta.5"
  PHP_VERSION: "8.3"
  HYPERFINE_RUNS: 3

jobs:

  # ── PR benchmark: triggered by "/benchmark" comment ──────────────────
  pr-benchmark:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/benchmark')
      && contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write  # needed for posting PR comments
      issues: write  # needed for comment reactions
    steps:

      - name: React to comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket --silent

      - name: Get PR refs
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          PR_JSON=$(gh pr view "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --json headRefOid,baseRefOid,headRefName,number,headRepository)
          HEAD_REPO=$(echo "$PR_JSON" | jq -r .headRepository.nameWithOwner)
          EXPECTED_REPO="${{ github.repository }}"
          if [ "$HEAD_REPO" != "$EXPECTED_REPO" ]; then
            echo "::error::Refusing to benchmark PR from a different repository (head: $HEAD_REPO, expected: $EXPECTED_REPO)"
            exit 1
          fi
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r .baseRefOid)" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo "$PR_JSON" | jq -r .number)" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          path: plugin-pr

      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.base_sha }}
          path: plugin-base

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          ini-values: opcache.enable_cli=1
          coverage: none
          tools: composer:v2

      - name: Install hyperfine
        # GitHub-hosted runner images ship a recent apt cache, so skip `apt-get update`.
        # Fall back to update+install only if the cached index is stale.
        run: sudo apt-get install -yqq hyperfine || (sudo apt-get update -qq && sudo apt-get install -yqq hyperfine)

      - name: Clone Monica
        run: |
          git clone --depth 1 --branch "$MONICA_REF" \
            "https://github.com/$MONICA_REPO" /tmp/monica-source

      # Cache Monica's vendor once on the shared source so both variants inherit it via `cp -a`.
      # Key is safe to pin to MONICA_REF + PHP_VERSION because the ref points at a tag
      # with an immutable composer.lock.
      - name: Cache Monica vendor
        uses: actions/cache@v5
        with:
          path: /tmp/monica-source/vendor
          key: monica-vendor-${{ env.MONICA_REF }}-php${{ env.PHP_VERSION }}-v1

      - name: Prime Monica vendor
        run: |
          if [ ! -d /tmp/monica-source/vendor ]; then
            cd /tmp/monica-source
            COMPOSER_MEMORY_LIMIT=-1 composer install --no-interaction --no-progress
          fi

      - name: Setup benchmark projects
        run: |
          setup_project() {
            local dir=$1 plugin_path=$2
            cp -a /tmp/monica-source "$dir"
            cd "$dir"
            composer config repositories.plugin \
              '{"type": "path", "url": "'"$plugin_path"'", "options": {"symlink": true}}'
            composer config minimum-stability dev
            composer require --dev "psalm/plugin-laravel:*" --no-interaction --no-update
            COMPOSER_MEMORY_LIMIT=-1 composer update psalm/plugin-laravel \
              --no-interaction --no-progress --with-all-dependencies
            composer show psalm/plugin-laravel
            cp "$GITHUB_WORKSPACE/plugin-base/tests/Benchmark/psalm-benchmark.xml" psalm-benchmark.xml
          }
          setup_project /tmp/monica-base "$GITHUB_WORKSPACE/plugin-base"
          setup_project /tmp/monica-pr "$GITHUB_WORKSPACE/plugin-pr"

      # Use base checkout's harness for both runs so the PR cannot alter measurement.
      - name: Benchmark with hyperfine
        run: |
          HARNESS="$GITHUB_WORKSPACE/plugin-base/tests/Benchmark/run-psalm.sh"
          > /tmp/mem-base.txt && > /tmp/mem-pr.txt
          > /tmp/issues-base.txt && > /tmp/issues-pr.txt
          > /tmp/stats-base.txt && > /tmp/stats-pr.txt
          # No warmup: this job measures the diff between base and PR, both pay the same
          # first-run page-cache tax, so the comparison stays directionally correct.
          hyperfine \
            --runs "$HYPERFINE_RUNS" \
            --command-name base "bash \"$HARNESS\" /tmp/monica-base psalm-benchmark.xml /tmp/mem-base.txt /tmp/issues-base.txt /tmp/stats-base.txt" \
            --command-name pr   "bash \"$HARNESS\" /tmp/monica-pr   psalm-benchmark.xml /tmp/mem-pr.txt /tmp/issues-pr.txt /tmp/stats-pr.txt" \
            --export-json /tmp/hyperfine.json \
            --ignore-failure
          echo "--- hyperfine results ---"
          cat /tmp/hyperfine.json | jq '.results[] | {command, mean, stddev, min, max}'

      - name: Compare results
        id: compare
        run: |
          set +e
          REPORT=$(php plugin-base/tests/Benchmark/compare.php \
            /tmp/hyperfine.json /tmp/mem-base.txt /tmp/mem-pr.txt \
            /tmp/issues-base.txt /tmp/issues-pr.txt \
            /tmp/stats-base.txt /tmp/stats-pr.txt)
          EXIT_CODE=$?
          set -e
          echo "$REPORT"
          {
            echo "report<<REPORT_EOF"
            echo "$REPORT"
            echo "REPORT_EOF"
          } >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.compare.outputs.report }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          BODY="${REPORT:-Benchmark failed to produce results. Check the workflow logs.}"
          gh pr comment "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --body "$BODY"


  # ── Master benchmark: stores result + historical trend ───────────────
  master-benchmark:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed for gh-pages auto-push (benchmark history)
    steps:

      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          ini-values: opcache.enable_cli=1
          coverage: none
          tools: composer:v2

      - name: Install hyperfine
        # GitHub-hosted runner images ship a recent apt cache, so skip `apt-get update`.
        # Fall back to update+install only if the cached index is stale.
        run: sudo apt-get install -yqq hyperfine || (sudo apt-get update -qq && sudo apt-get install -yqq hyperfine)

      - name: Clone Monica
        run: |
          git clone --depth 1 --branch "$MONICA_REF" \
            "https://github.com/$MONICA_REPO" /tmp/monica

      - name: Cache Monica vendor
        uses: actions/cache@v5
        with:
          path: /tmp/monica/vendor
          key: monica-vendor-${{ env.MONICA_REF }}-php${{ env.PHP_VERSION }}-v1

      - name: Setup benchmark project
        run: |
          cd /tmp/monica
          if [ ! -d vendor ]; then
            COMPOSER_MEMORY_LIMIT=-1 composer install --no-interaction --no-progress
          fi
          composer config repositories.plugin \
            '{"type": "path", "url": "'"$GITHUB_WORKSPACE"'", "options": {"symlink": true}}'
          composer config minimum-stability dev
          composer require --dev "psalm/plugin-laravel:*" --no-interaction --no-update
          COMPOSER_MEMORY_LIMIT=-1 composer update psalm/plugin-laravel \
            --no-interaction --no-progress --with-all-dependencies
          composer show psalm/plugin-laravel
          cp "$GITHUB_WORKSPACE/tests/Benchmark/psalm-benchmark.xml" psalm-benchmark.xml

      - name: Benchmark with hyperfine
        run: |
          > /tmp/mem.txt
          hyperfine \
            --warmup 1 \
            --runs "$HYPERFINE_RUNS" \
            --command-name psalm \
            "bash \"$GITHUB_WORKSPACE/tests/Benchmark/run-psalm.sh\" /tmp/monica psalm-benchmark.xml /tmp/mem.txt" \
            --export-json /tmp/hyperfine.json \
            --ignore-failure

      - name: Validate benchmark results
        run: |
          php -r '
          $data = json_decode(file_get_contents("/tmp/hyperfine.json"), true, 512, JSON_THROW_ON_ERROR);
          $exitCodes = $data["results"][0]["exit_codes"] ?? [];
          $failures = array_filter($exitCodes, fn($c) => (int) $c === 1 || (int) $c >= 128);
          if ($failures !== []) {
              fwrite(STDERR, "Psalm failed with exit codes: " . implode(", ", $exitCodes) . "\n");
              exit(1);
          }
          '

      # Transform to github-action-benchmark customSmallerIsBetter format
      - name: Build trend data
        run: |
          php -r '
          $h = json_decode(file_get_contents("/tmp/hyperfine.json"), true, 512, JSON_THROW_ON_ERROR)["results"][0];
          $memLines = array_filter(array_map("trim", file("/tmp/mem.txt")), fn($l) => $l !== "");
          $peakMem = max(array_map("floatval", $memLines));
          echo json_encode([
              ["name" => "Wall time",   "value" => round($h["mean"], 2),   "unit" => "s",  "range" => "± " . round($h["stddev"], 2)],
              ["name" => "Peak memory", "value" => round($peakMem, 0),     "unit" => "MB"],
          ], JSON_PRETTY_PRINT);
          ' > /tmp/benchmark-trend.json
          cat /tmp/benchmark-trend.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: |
            /tmp/hyperfine.json
            /tmp/benchmark-trend.json
          retention-days: 90

      - name: Store benchmark trend
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          name: Plugin Performance
          output-file-path: /tmp/benchmark-trend.json
          github-token: ${{ github.token }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
