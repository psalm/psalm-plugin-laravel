name: Test Laravel app

on:
  workflow_dispatch:
  push:
    paths:
      - '**.php'
      - '**.stubphp'
      - 'composer.json'
      - 'tests/Application/laravel*'
      - '.github/workflows/test-laravel-app.yml'
  pull_request:
    paths:
      - '**.php'
      - '**.stubphp'
      - 'composer.json'
      - 'tests/Application/laravel*'
      - '.github/workflows/test-laravel-app.yml'
  schedule:
    # Weekly on Friday at 06:00 UTC
    - cron: "0 6 * * 5"

# Cancel superseded runs on the same branch/PR to save CI minutes on fast pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test Laravel ${{ matrix.laravel-installer-version }} (PHP ${{ matrix.php-version }})

    strategy:
      fail-fast: true
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        laravel-installer-version:
          - '12.12.2'
          - 'dev-master'
        exclude:
          - php-version: '8.2'
            laravel-installer-version: 'dev-master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Build a Laravel project and run Psalm on it
        run: |
          LARAVEL_INSTALLER_VERSION=${{ matrix.laravel-installer-version }} ./tests/Application/laravel-test.sh

      - run: |
          echo "Psalm analysis failed on a fresh Laravel project. Please consider updating baseline: tests/Application/laravel-test-psalm-baseline.xml"
        if: ${{ failure() }}