name: Test Laravel app

on:
  workflow_dispatch:
  push:
    paths:
      - '**.php'
      - '**.phpstub'
      - 'composer.json'
      - 'tests/Application/laravel*'
      - '.github/workflows/test-laravel-app.yml'
  pull_request:
    paths:
      - '**.php'
      - '**.phpstub'
      - 'composer.json'
      - 'tests/Application/laravel*'
      - '.github/workflows/test-laravel-app.yml'
  schedule:
    # Weekly on Friday at 06:00 UTC
    - cron: "0 6 * * 5"

# Cancel superseded runs on the same branch/PR to save CI minutes on fast pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test Laravel ${{ matrix.laravel-installer-version }} (PHP ${{ matrix.php-version }})

    strategy:
      fail-fast: true
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        laravel-installer-version:
          - '12.12.2'
          - 'dev-master'
        exclude:
          - php-version: '8.2'
            laravel-installer-version: 'dev-master'

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Build a Laravel project and run Psalm on it
        run: |
          LARAVEL_INSTALLER_VERSION=${{ matrix.laravel-installer-version }} ./tests/Application/laravel-test.sh --verbose

      - run: |
          echo "Psalm analysis failed on a fresh Laravel project. Please consider updating baseline: tests/Application/laravel-test-psalm-baseline.xml"
        if: ${{ failure() }}
