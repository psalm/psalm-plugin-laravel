# see https://github.com/release-drafter/release-drafter
# see .github/release.yml (contains the template)
name: Release Drafter

on:
  workflow_dispatch:
  push:
    # Draft releases only for the latest major (master). The 3.x branch is a
    # separate major line and is released/tagged manually, not drafted here.
    branches:
      - master

permissions:
  contents: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to draft releases
      pull-requests: read   # required for autolabeler input
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Drafts your next Release notes as Pull Requests are merged into "master"
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
        with:
          # (Optional) specify config name to use, relative to .github/. Default: release-drafter.yml
          config-name: config/release-drafter.yml
          token: ${{ secrets.GITHUB_TOKEN }}
