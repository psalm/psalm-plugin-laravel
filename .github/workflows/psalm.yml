name: Psalm

on:
  push:
    branches: [master]
    paths:
      - '**.php'
      - 'psalm*'
      - 'composer.json'
      - '.github/workflows/psalm.yml'
  pull_request:
    paths:
      - '**.php'
      - 'psalm*'
      - 'composer.json'
      - '.github/workflows/psalm.yml'

# Cancel superseded runs on the same branch/PR to save CI minutes on fast pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Block all outbound calls except allowlist)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            packagist.org:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443
            shepherd.dev:443

      - name: Silence Canonical telemetry units (apt-news, esm-cache, motd-news, ua-timer)
        run: sudo systemctl mask --now apt-news esm-cache motd-news ua-timer.timer

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: 8.4
          coverage: none

      - name: Install composer dependencies
        run: composer install -n --prefer-dist

      - name: Run Psalm
        run: ./vendor/bin/psalm --threads=2 --output-format=github --shepherd
