name: Psalm

on:
  push:
    paths:
      - '**.php'
      - 'psalm*'
      - 'composer.json'
      - '.github/workflows/psalm.yml'
  pull_request:
    paths:
      - '**.php'
      - 'psalm*'
      - 'composer.json'
      - '.github/workflows/psalm.yml'

jobs:
  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none

      - name: Install composer dependencies
        run: composer install -n --prefer-dist

      - name: Run Psalm
        # TODO: remove PSALM_ALLOW_XDEBUG=1 once https://github.com/vimeo/psalm/issues/11723 is fixed
        # Disables JIT to work around PHP 8.4.19+ bug causing false InvalidAttribute errors on #[Override]
        run: PSALM_ALLOW_XDEBUG=1 ./vendor/bin/psalm --threads=2 --output-format=github --shepherd
