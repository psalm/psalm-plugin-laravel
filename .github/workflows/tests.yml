name: Tests

on:
  workflow_dispatch:
  push:
    paths:
      - '**.php'
      - '**.stubphp'
      - '**.phpt'
      - '**.yml'
      - 'composer.json'
      - 'tests.yml'
  pull_request:
    paths:
      - '**.php'
      - '**.stubphp'
      - '**.phpt'
      - 'composer.json'
      - 'tests.yml'
  schedule:
    # Weekly on Friday at 06:00 UTC
    - cron: "0 6 * * 5"

jobs:

  unit_tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none
          tools: composer:v2

      - name: Check Composer configuration
        run: composer validate --strict

      - name: Install composer dependencies
        run: composer install

      - name: Run Unit tests
        run: composer test:unit


  type_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [ 8.5, 8.4, 8.3, 8.2 ]
        laravel: [ ^13.0, ^12.0 ]
        dependencies: [ highest ]
        exclude:
          - php: 8.2
            laravel: ^13.0
    name: Type test P${{ matrix.php }} | L${{ matrix.laravel }} | ${{ matrix.dependencies == 'highest' && '↑' || '↓' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=256M
          coverage: none
          tools: composer

      - name: Install dependencies from composer.json
        run: composer update --with="laravel/framework:${{ matrix.laravel }}" --no-interaction --no-progress --prefer-dist --prefer-stable ${{ matrix.dependencies == 'lowest' && '--prefer-lowest' || '' }}

      - name: Run Psalm/Type tests
        run: composer test:type