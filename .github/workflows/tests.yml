name: Tests

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '**.php'
      - '**.phpstub'
      - '**.phpt'
      - 'composer.json'
      - '.github/workflows/tests.yml'
      - 'bin/ci/check-phpt-conventions.sh'
  pull_request:
    paths:
      - '**.php'
      - '**.phpstub'
      - '**.phpt'
      - 'composer.json'
      - '.github/workflows/tests.yml'
      - 'bin/ci/check-phpt-conventions.sh'
  schedule:
    # Weekly on Friday at 06:00 UTC
    - cron: "0 6 * * 5"

# Cancel superseded runs on the same branch/PR to save CI minutes on fast pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  phpt_conventions:
    name: PHPT conventions
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check PHPT type-test conventions
        run: bash bin/ci/check-phpt-conventions.sh

  unit_tests:
    name: Unit test P${{ matrix.php }} | L${{ matrix.laravel || 'lockfile' }}
    runs-on: ubuntu-latest
    strategy:
      # Version-split fixtures fail per-cell by design; keep every cell's verdict visible.
      fail-fast: false
      matrix:
        include:
          # Lockfile cells cover both sides of the PHP 8.4/8.5 getMethods() initializer-order split.
          - php: '8.5'
          - php: '8.4'
          # Declared framework floors.
          - php: '8.4'
            laravel: '13.3.0'
          - php: '8.2'
            laravel: '12.14.0'
          # Highest 12.x: the enum $connection path is live since 12.28.
          - php: '8.2'
            laravel: '^12.14'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Check Composer configuration
        if: matrix.php == '8.4' && !matrix.laravel
        run: composer validate --strict

      - name: Install composer dependencies (lockfile)
        if: ${{ !matrix.laravel }}
        run: composer install

      - name: Install with Laravel constraint
        # Floors may have published advisories; this isolated test install is never deployed.
        if: matrix.laravel
        env:
          LARAVEL_CONSTRAINT: ${{ matrix.laravel }}
        run: >-
          composer update --with="laravel/framework:$LARAVEL_CONSTRAINT" --with-all-dependencies
          --no-interaction --no-progress --prefer-dist --prefer-stable --no-blocking --no-audit

      - name: Verify installed Laravel version
        if: matrix.laravel && !startsWith(matrix.laravel, '^')
        env:
          EXPECTED_LARAVEL: v${{ matrix.laravel }}
        run: >-
          php -r 'require "vendor/autoload.php";
          exit(Composer\InstalledVersions::getPrettyVersion("laravel/framework") === getenv("EXPECTED_LARAVEL") ? 0 : 1);'

      - name: Run Unit tests (lockfile)
        if: ${{ !matrix.laravel }}
        run: composer test:unit

      - name: Run Unit tests
        # Constraint installs may resolve PHPUnit 11 (Testbench 10), which lacks --display-phpunit-notices.
        if: matrix.laravel
        run: vendor/bin/phpunit --testsuite=unit --display-deprecations --display-notices


  type_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [ 8.5, 8.4, 8.3, 8.2 ]
        laravel: [ ^13.3, ^12.14, ^11.35 ]
        dependencies: [ highest ]
        exclude:
          - php: 8.5
            laravel: ^11.35
          - php: 8.2
            laravel: ^13.3
    name: Type test P${{ matrix.php }} | L${{ matrix.laravel }} | ${{ matrix.dependencies == 'highest' && '↑' || '↓' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=256M
          coverage: none
          tools: composer

      - name: Install dependencies from composer.json
        run: composer update --with="laravel/framework:${{ matrix.laravel }}" --no-interaction --no-progress --prefer-dist --prefer-stable ${{ matrix.dependencies == 'lowest' && '--prefer-lowest' || '' }}

      - name: Run Psalm/Type tests
        run: composer test:type
