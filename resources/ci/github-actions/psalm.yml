# Generated by `psalm-laravel add github` (re-run with --force to update).
# Psalm 7 runs type and taint analysis in a single pass:
#  - type analysis fails on Psalm's exit code;
#  - taint analysis uploads SARIF to Code Scanning and fails on findings.

name: Psalm

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: psalm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  psalm:
    name: Psalm static analysis (types + taint)
    runs-on: ubuntu-latest
    steps:
      - name: Block unexpected egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Covers checkout, setup-php, Composer (public Packagist) and the SARIF upload. Extend for other hosts
          # (private registry, VCS repos, extra plugins). Use egress-policy: audit to discover them.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            packagist.org:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443
            results-receiver.actions.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      # One pass = type + taint. Psalm 7 runs taint analysis by default (no --taint-analysis flag needed),
      # so a plain run emits both type and taint findings: GitHub annotations on stdout + a SARIF report.
      # Exits 0 even on findings; a real crash exits non-zero, fails this step, and skips the rest.
      - name: Run Psalm
        run: ./vendor/bin/psalm --report=psalm.sarif --report-show-info=false

      # Skipped on fork and Dependabot PRs: GitHub caps their GITHUB_TOKEN at read-only, so the upload
      # would fail with "Resource not accessible by integration" despite `security-events: write` above.
      # The "Fail on Psalm findings" step below still runs — findings block those PRs via annotations + exit code.
      - name: Upload SARIF to GitHub Code Scanning
        if: >-
          github.actor != 'dependabot[bot]' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: psalm.sarif
          category: psalm

      # Fail on any error-level finding (taint = always error; type errors depend on your psalm.xml errorLevel).
      # Psalm exits 0 even on findings when it writes a report inside GitHub Actions (vimeo/psalm@6e39c24),
      # so CI is failed from the SARIF after upload, not from the exit code. Upload first so findings are recorded even on a failing run.
      - name: Fail on Psalm findings
        run: |
          errors=$(jq '[.runs[].results[] | select(.level == "error")] | length' psalm.sarif)
          echo "Psalm error-level findings: $errors"
          if [ "$errors" -gt 0 ]; then
            echo "::error::Psalm reported $errors error-level finding(s). See annotations on Files changed (maintainers: Security > Code scanning)."
            exit 1
          fi
