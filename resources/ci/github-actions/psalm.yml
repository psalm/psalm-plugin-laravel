# Psalm static analysis workflow, generated by `vendor/bin/psalm-laravel add` (targets: "ci", "github").
#
# Two independent jobs run in parallel.
#   * types: Psalm type analysis (inference and issues).
#   * security: Psalm taint analysis, uploaded to GitHub Code Scanning as SARIF.
#
# The security job is marked `continue-on-error: true` so first-time findings
# surface in the Security tab without blocking PRs. Remove it once you have
# a triaged baseline (`./vendor/bin/psalm --taint-analysis --set-baseline=psalm-baseline.xml`).
#
# Customise as needed.
#   * Pin `php-version` to match your project (8.2+ supported by the plugin).
#   * Scope the security job to PRs only by adding
#     `if: github.event_name == 'pull_request'` to the job.

name: Psalm

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  types:
    name: Psalm type analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Psalm
        run: ./vendor/bin/psalm --output-format=github --no-progress --no-cache --threads=2

  security:
    name: Psalm security analysis
    runs-on: ubuntu-latest
    # security-events: write is required for the SARIF upload; actions: read
    # covers SARIF-upload edge cases when GitHub Advanced Security is in use.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Psalm taint analysis
        run: ./vendor/bin/psalm --taint-analysis --report=psalm-security.sarif --output-format=github --no-progress --no-cache --threads=2
        continue-on-error: true

      # Guard with hashFiles so the step skips (rather than fails) when Psalm
      # crashed before writing the report or when the repo has no findings yet.
      - name: Upload SARIF to GitHub Code Scanning
        if: ${{ always() && hashFiles('psalm-security.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: psalm-security.sarif
          category: psalm-security
