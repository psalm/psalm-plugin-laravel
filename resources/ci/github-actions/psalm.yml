# Generated by `psalm-laravel add github` (re-run with --force to update).
# Psalm 6 runs type and taint analysis in separate modes (--taint-analysis skips type checks), so two parallel jobs are needed:
#  - type analysis fails on Psalm's exit code;
#  - taint analysis uploads SARIF to Code Scanning and fails on findings.

name: Psalm

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: psalm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Psalm type analysis
    runs-on: ubuntu-latest
    steps:
      - name: Block unexpected egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Covers checkout, setup-php and Composer (public Packagist). Extend for other hosts
          # (private registry, VCS repos, extra plugins). Use egress-policy: audit to discover them.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            packagist.org:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443

      # No git ops after checkout, so drop the token: a compromised later step cannot push.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      # No --report, so Psalm exits non-zero on findings and fails the job directly.
      - name: Run Psalm (type analysis)
        run: ./vendor/bin/psalm

  taint-analysis:
    name: Psalm taint analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Block unexpected egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Same as the type job, plus the SARIF upload endpoint.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            packagist.org:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443
            results-receiver.actions.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      # In taint mode Psalm exits 0 even on findings when writing a report under Actions, so CI is
      # failed from the SARIF below, not the exit code. --ignore-baseline stops a type baseline from
      # reporting as UnusedBaselineEntry here (taint mode skips type analysis) (#1139).
      - name: Run Psalm (taint analysis)
        run: ./vendor/bin/psalm --taint-analysis --ignore-baseline --report=psalm.sarif --report-show-info=false

      # Skipped on fork and Dependabot PRs: GitHub caps their GITHUB_TOKEN at read-only, so the upload
      # would fail with "Resource not accessible by integration" despite `security-events: write` above.
      # The "Fail on Psalm findings" step below still runs — findings block those PRs via annotations + exit code.
      - name: Upload SARIF to GitHub Code Scanning
        if: >-
          github.actor != 'dependabot[bot]' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: psalm.sarif
          category: psalm-taint

      # Upload first so findings are recorded even on a failing run, then fail on any error-level finding.
      - name: Fail on Psalm taint findings
        run: |
          errors=$(jq '[.runs[].results[] | select(.level == "error")] | length' psalm.sarif)
          echo "Psalm taint findings: $errors"
          if [ "$errors" -gt 0 ]; then
            echo "::error::Psalm reported $errors taint finding(s). See annotations on Files changed (maintainers: Security > Code scanning)."
            exit 1
          fi
