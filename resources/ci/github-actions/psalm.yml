# Psalm static analysis, generated by `vendor/bin/psalm-laravel add`.
#
# Two jobs run in parallel. Psalm 6.x needs both: `--taint-analysis` switches Psalm to a
# taint-only mode that skips type analysis, so a single run cannot cover both.
#   * static-analysis - type analysis. GitHub annotations on stdout; fails on Psalm's exit code.
#   * taint-analysis  - taint/security analysis. Uploads SARIF to Code Scanning and fails on findings.
#
# Add your release branches under `push:` so Code Scanning builds the default-branch baseline it diffs PRs against.
# Baseline existing type issues so only new ones fail the type job:
#   ./vendor/bin/psalm --set-baseline=psalm-baseline.xml
# That writes errorBaseline into psalm.xml; the taint job below runs --ignore-baseline so the
# type baseline does not surface as UnusedBaselineEntry (taint mode skips type analysis, so a
# type baseline matches nothing and every entry reads as "unused"). Psalm 6 has a single
# errorBaseline attribute, so a per-job taint baseline is not wired here: --set-baseline under
# --taint-analysis would overwrite that single errorBaseline pointer.

name: Psalm

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: psalm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Psalm type analysis
    runs-on: ubuntu-latest
    steps:
      - name: Block unexpected egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Covers checkout, setup-php and Composer (public Packagist). Extend it if your project
          # reaches other hosts (private Composer registry, VCS/path repos, extra Psalm plugins). A blocked
          # call shows in the step log; use egress-policy: audit to discover endpoints without failing the build.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            packagist.org:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443

      # No git operations run after checkout, so drop the persisted token. Defense in depth:
      # a compromised later step (a malicious Composer dependency or Psalm plugin) cannot reuse
      # the token to push to the repo, even though github.com is on the egress allowlist.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      # Type analysis only (Psalm 6.x does not run taint by default). Psalm auto-selects the github
      # annotation format under Actions. No --report, so Psalm exits non-zero on findings and fails
      # this job directly; annotations show on the PR's Files changed tab.
      - name: Run Psalm (type analysis)
        run: ./vendor/bin/psalm

  taint-analysis:
    name: Psalm taint analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (block unexpected egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Same as the type-analysis job, plus the endpoint the SARIF upload posts to.
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            packagist.org:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443
            results-receiver.actions.githubusercontent.com:443

      # No git operations run after checkout, so drop the persisted token. Defense in depth:
      # a compromised later step (a malicious Composer dependency or Psalm plugin) cannot reuse the
      # token to push, even though github.com is on the egress allowlist. The SARIF upload uses the
      # Actions token (security-events: write), not git credentials.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      # Taint analysis only. --taint-analysis switches Psalm to taint mode and skips type analysis
      # (that is the type-analysis job). When Psalm writes a report during taint analysis inside
      # GitHub Actions it exits 0 even on findings (IssueBuffer guards on taint_flow_graph +
      # generated_report_options + $_SERVER['GITHUB_WORKFLOW']), so the run step succeeds and CI is
      # failed from the SARIF after upload, not from the exit code. A real crash exits non-zero,
      # fails this step and skips the rest.
      # --ignore-baseline keeps a type baseline (errorBaseline in psalm.xml) from reporting as
      # UnusedBaselineEntry here: taint mode skips type analysis, so the baseline matches none
      # and each entry would otherwise count as "unused" and fail the job (#1139).
      - name: Run Psalm (taint analysis)
        run: ./vendor/bin/psalm --taint-analysis --ignore-baseline --report=psalm.sarif --report-show-info=false

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: psalm.sarif
          category: psalm-taint

      # Upload first so findings are recorded even on a failing run, then fail on any error-level finding.
      - name: Fail on Psalm taint findings
        run: |
          errors=$(jq '[.runs[].results[] | select(.level == "error")] | length' psalm.sarif)
          echo "Psalm taint findings: $errors"
          if [ "$errors" -gt 0 ]; then
            echo "::error::Psalm reported $errors taint finding(s). See annotations on Files changed (maintainers: Security > Code scanning)."
            exit 1
          fi
